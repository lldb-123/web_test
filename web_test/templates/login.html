<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - MyProject</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="logo"><b>MyProject</b></div>
        <ul class="nav-links">
            <li><a href="/">首页</a></li>
            <li><a href="/register.html">注册</a></li>
        </ul>
    </nav>

    <main class="container">
        <h2>欢迎回来</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form action="/api/login" method="POST" class="auth-form">
            <div class="input-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">登 录</button>
        </form>

        <p style="margin-top: 15px; font-size: 0.9em;">
            还没有账号？ <a href="/register.html" style="color: #3498db; text-decoration: none;">立即注册</a>
        </p>
    </main>
</body>
</html>
